name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            python3-pip build-essential git unzip zip \
            autoconf libtool pkg-config cmake \
            zlib1g-dev libffi-dev libssl-dev patch wget

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0 cython==0.29.33

      - name: Install Android NDK r25b
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r25b
          add-to-path: true

      - name: Install Android SDK
        run: |
          ANDROID_SDK=$HOME/.buildozer/android/platform/android-sdk
          mkdir -p $ANDROID_SDK/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/cmdtools.zip
          unzip -q /tmp/cmdtools.zip -d /tmp/cmdtools
          mv /tmp/cmdtools/cmdline-tools $ANDROID_SDK/cmdline-tools/latest
          yes | $ANDROID_SDK/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_SDK --licenses > /dev/null 2>&1 || true
          $ANDROID_SDK/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_SDK "platform-tools" "platforms;android-33" "build-tools;33.0.0"
          echo "ANDROID_SDK=$ANDROID_SDK" >> $GITHUB_ENV

      - name: Link NDK into Buildozer folder and patch downloader
        env:
          NDK_PATH: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          NDK_DST="$HOME/.buildozer/android/platform/android-ndk-r25b"
          mkdir -p "$(dirname $NDK_DST)"
          ln -sfn "$NDK_PATH" "$NDK_DST"
          echo "NDK linked: $NDK_DST"

          ANDROID_PY=$(python3 -c "import buildozer, os; print(os.path.join(os.path.dirname(buildozer.__file__), 'targets/android.py'))")
          echo "Patching $ANDROID_PY"

          python3 -c "
import re
with open('$ANDROID_PY', 'r') as f:
    content = f.read()
old = 'self.buildozer.download(url,'
new = '# PATCHED skip download\n            return\n            self.buildozer.download(url,'
content = content.replace(old, new, 1)
with open('$ANDROID_PY', 'w') as f:
    f.write(content)
print('Patch applied OK')
"

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Build APK
        run: |
          export ANDROIDSDK="$HOME/.buildozer/android/platform/android-sdk"
          export ANDROIDNDK="$HOME/.buildozer/android/platform/android-ndk-r25b"
          export ANDROIDAPI="33"
          export ANDROIDMINAPI="21"
          buildozer -v android debug 2>&1 | tee build.log

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ScientificCalculator-APK
          path: bin/*.apk
          if-no-files-found: error

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
