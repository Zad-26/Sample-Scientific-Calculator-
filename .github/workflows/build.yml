name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            python3-pip build-essential git unzip zip \
            autoconf libtool pkg-config cmake \
            zlib1g-dev libffi-dev libssl-dev patch wget \
            libltdl-dev

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0 cython==0.29.33

      - name: Install NDK r25b
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r25b
          add-to-path: true

      - name: Setup SDK and NDK in Buildozer folders
        run: |
          mkdir -p $HOME/.buildozer/android/platform

          # Copy NDK as real directory
          NDK_SRC="${{ steps.setup-ndk.outputs.ndk-path }}"
          NDK_DST="$HOME/.buildozer/android/platform/android-ndk-r25b"
          cp -r "$NDK_SRC" "$NDK_DST"
          echo "NDK is real dir: $(test -d $NDK_DST && echo YES || echo NO)"

          # Setup SDK
          SDK_DST="$HOME/.buildozer/android/platform/android-sdk"
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            --licenses > /dev/null 2>&1 || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-33" \
            "build-tools;33.0.2" \
            "platform-tools"
          cp -r "$ANDROID_HOME" "$SDK_DST"
          echo "SDK is real dir: $(test -d $SDK_DST && echo YES || echo NO)"
          find "$SDK_DST/build-tools" -name "aidl" 2>/dev/null

      - name: Patch Buildozer NDK check (MUST run after any cache restore)
        run: |
          ANDROID_PY=$(python3 -c "import buildozer, os; print(os.path.join(os.path.dirname(buildozer.__file__), 'targets/android.py'))")
          echo "Patching: $ANDROID_PY"

          # Replace file_exists with os.path.isdir - works on real directories
          sed -i 's/self\.buildozer\.file_exists(ndk_dir)/os.path.isdir(ndk_dir)/g' "$ANDROID_PY"

          # Verify
          echo "After patch:"
          grep -n "ndk_dir" "$ANDROID_PY" | head -10

      - name: Build APK
        run: |
          NDK_DIR="$HOME/.buildozer/android/platform/android-ndk-r25b"
          SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"

          echo "NDK exists: $(test -d $NDK_DIR && echo YES || echo NO)"
          echo "SDK exists: $(test -d $SDK_DIR && echo YES || echo NO)"

          export ANDROIDSDK="$SDK_DIR"
          export ANDROIDNDK="$NDK_DIR"
          export ANDROIDAPI=33
          export ANDROIDMINAPI=21
          export PATH="$SDK_DIR/build-tools/33.0.2:$SDK_DIR/platform-tools:$PATH"

          buildozer -v android debug 2>&1 | tee build.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ScientificCalculator-APK
          path: bin/*.apk
          if-no-files-found: error

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
