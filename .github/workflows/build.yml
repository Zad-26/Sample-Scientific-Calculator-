name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3-pip build-essential git unzip zip autoconf libtool pkg-config cmake zlib1g-dev libffi-dev libssl-dev patch wget libltdl-dev

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0 cython==0.29.33

      - name: Install NDK r25b
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r25b
          add-to-path: true

      - name: Setup SDK and NDK
        env:
          NDK_PATH: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          mkdir -p $HOME/.buildozer/android/platform

          # ── NDK ──────────────────────────────────────
          NDK_DST1="$HOME/.buildozer/android/platform/android-ndk-r25b"
          NDK_DST2="$HOME/.buildozer/android/platform/android-ndk-r25.2.9519653"
          cp -r "$NDK_PATH" "$NDK_DST1"
          cp -r "$NDK_PATH" "$NDK_DST2"
          echo "NDK1 exists: $(test -d $NDK_DST1 && echo YES || echo NO)"
          echo "NDK2 exists: $(test -d $NDK_DST2 && echo YES || echo NO)"

          # ── SDK ──────────────────────────────────────
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          yes | $SDKMANAGER --licenses > /dev/null 2>&1 || true

          # Install all needed SDK packages including legacy tools
          $SDKMANAGER \
            "platforms;android-33" \
            "build-tools;33.0.2" \
            "platform-tools" \
            "tools"

          # Create legacy tools/bin/sdkmanager wrapper that Buildozer expects
          mkdir -p "$ANDROID_HOME/tools/bin"
          cp "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "$ANDROID_HOME/tools/bin/sdkmanager" 2>/dev/null || \
            ln -sf "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "$ANDROID_HOME/tools/bin/sdkmanager"

          # Copy SDK
          SDK_DST="$HOME/.buildozer/android/platform/android-sdk"
          cp -r "$ANDROID_HOME" "$SDK_DST"
          echo "SDK exists: $(test -d $SDK_DST && echo YES || echo NO)"

          # Verify sdkmanager in expected location
          echo "sdkmanager at tools/bin: $(test -f $SDK_DST/tools/bin/sdkmanager && echo YES || echo NO)"
          find "$SDK_DST/build-tools" -name "aidl" 2>/dev/null

      - name: Patch Buildozer NDK method
        run: python3 patch_buildozer.py

      - name: Build APK
        run: |
          SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"
          NDK_DIR="$HOME/.buildozer/android/platform/android-ndk-r25.2.9519653"

          export ANDROIDSDK="$SDK_DIR"
          export ANDROIDNDK="$NDK_DIR"
          export ANDROIDAPI=33
          export ANDROIDMINAPI=21
          export PATH="$SDK_DIR/build-tools/33.0.2:$SDK_DIR/platform-tools:$SDK_DIR/tools/bin:$PATH"

          buildozer -v android debug 2>&1 | tee build.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ScientificCalculator-APK
          path: bin/*.apk
          if-no-files-found: error

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
