name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3-pip build-essential git unzip zip autoconf libtool pkg-config cmake zlib1g-dev libffi-dev libssl-dev patch wget libltdl-dev

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0 cython==0.29.33

      - name: Install NDK r25b
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r25b
          add-to-path: true

      - name: Setup Buildozer platform folder
        env:
          NDK_PATH: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          mkdir -p $HOME/.buildozer/android/platform

          # Symlink GitHub's pre-installed SDK
          ln -sfn /usr/local/lib/android/sdk $HOME/.buildozer/android/platform/android-sdk

          # Install required SDK packages
          yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager "platforms;android-33" "build-tools;33.0.2" "platform-tools"

          # Create legacy tools/bin/sdkmanager wrapper using printf (no heredoc)
          sudo mkdir -p /usr/local/lib/android/sdk/tools/bin
          printf '#!/bin/bash\nexec /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager "$@"\n' | sudo tee /usr/local/lib/android/sdk/tools/bin/sdkmanager > /dev/null
          sudo chmod +x /usr/local/lib/android/sdk/tools/bin/sdkmanager
          echo "sdkmanager wrapper test:"
          /usr/local/lib/android/sdk/tools/bin/sdkmanager --version

          # Copy NDK into Buildozer's expected folders
          cp -r "$NDK_PATH" "$HOME/.buildozer/android/platform/android-ndk-r25b"
          cp -r "$NDK_PATH" "$HOME/.buildozer/android/platform/android-ndk-r25.2.9519653"
          echo "NDK exists: $(test -d $HOME/.buildozer/android/platform/android-ndk-r25.2.9519653 && echo YES || echo NO)"

      - name: Patch Buildozer NDK method
        run: python3 patch_buildozer.py

      - name: Build APK
        run: |
          export ANDROIDSDK="/usr/local/lib/android/sdk"
          export ANDROIDNDK="$HOME/.buildozer/android/platform/android-ndk-r25.2.9519653"
          export ANDROIDAPI=33
          export ANDROIDMINAPI=21
          export PATH="/usr/local/lib/android/sdk/build-tools/33.0.2:/usr/local/lib/android/sdk/platform-tools:/usr/local/lib/android/sdk/cmdline-tools/latest/bin:$PATH"
          buildozer -v android debug 2>&1 | tee build.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ScientificCalculator-APK
          path: bin/*.apk
          if-no-files-found: error

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
