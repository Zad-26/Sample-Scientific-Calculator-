name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:

      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Java 17
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      # 3. Install system dependencies
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            python3-pip \
            build-essential \
            git \
            unzip \
            zip \
            autoconf \
            libtool \
            pkg-config \
            cmake \
            zlib1g-dev \
            libffi-dev \
            libssl-dev \
            patch \
            wget

      # 4. Install Python dependencies
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0 cython==0.29.33

      # 5. Install Android SDK via sdkmanager
      - name: Install Android SDK
        run: |
          ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk
          mkdir -p $ANDROID_HOME/cmdline-tools

          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/cmdtools.zip
          unzip -q /tmp/cmdtools.zip -d /tmp/cmdtools
          mv /tmp/cmdtools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest

          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            --sdk_root=$ANDROID_HOME --licenses > /dev/null 2>&1 || true

          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            --sdk_root=$ANDROID_HOME \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.0"

          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV

      # 6. Install Android NDK into Buildozer's expected location
      - name: Install Android NDK
        run: |
          NDK_DIR=$HOME/.buildozer/android/platform/android-ndk-r25b
          mkdir -p $HOME/.buildozer/android/platform

          wget -q https://dl.google.com/android/repository/android-ndk-r25b-linux.zip \
            -O /tmp/ndk.zip

          unzip -q /tmp/ndk.zip -d $HOME/.buildozer/android/platform/

          # Confirm extraction
          ls $HOME/.buildozer/android/platform/

          echo "ANDROID_NDK_HOME=$NDK_DIR" >> $GITHUB_ENV

      # 7. Cache Buildozer (after SDK/NDK installed)
      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      # 8. Build APK
      - name: Build APK
        run: |
          buildozer -v android debug 2>&1 | tee build.log

      # 9. Upload APK
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ScientificCalculator-APK
          path: bin/*.apk
          if-no-files-found: error

      # 10. Upload build log always
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
